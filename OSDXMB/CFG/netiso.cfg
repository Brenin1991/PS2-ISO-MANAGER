url=http://192.168.0.121:5000
# report_key=
# Rede Neutrino (PLUS default): UDPFS — pasta de ISOs no PC, udpfs_server -d; PS2 -bsd=udpfs -dvd
udpfs_net=1
# Opcional: nome do BSD quando udpfs_net=1 (mapeia para APPS/neutrino/config/bsd-<nome>.toml).
# Ex.: udpfs_bsd=udpfs-debug (usa bsd-udpfs-debug.toml, útil para debug com smap_udptty.irx).
udpfs_bsd=udpfs-debug
udpbd_ps2_ip=192.0.2.100
# Pausa (ms) na PS2 após prepare e antes do Neutrino loadELF — reduz falhas intermitentes (browser). 0=desligar; máx. 8000.
udpbd_launch_delay_ms=450
# Modo bloco (um ISO por vez, -b no PC): udpfs_net=0 e no PC UDPBD_NET_MODE
# spin_ms=0 usa 1 ms no poll interno (async); não dá para ser 0 ms literal sem busy-wait.
spin_ms=10
draw_ms=450
stall_sec=180
use_segments=1
segment_bytes=33554432
chunk_bytes=0
# 1=receber segmento inteiro em XMB/temp (GET síncrono) e só então copiar para .partN — melhor se ISO está no USB e XMB no MC.
segment_buffer=0
segment_gap_ms=0
after_segment_ms=0
probe_ms=0
segment_stable_ticks=2
# Opcional: pausa ao mostrar barra cheia antes de fechar o overlay (0=imediato).
success_pause_ms=0
opl_smb_write_cfg=1
# Ao lançar jogo OPL+SMB (opl_smb_write_cfg=1): grava conf_last, conf_opl (ETH auto, menu SMB, autostart) e conf_network.
# opl_autostart_seconds=5
# opl_smb_port=4445
# opl_smb_share=PS2ISO
# opl_smb_user=opl
# opl_smb_pass=oplopl